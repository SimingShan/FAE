# FAE (ours) on shear — FORMAL DEFAULT = Senseiver + temporal predictor, NO dual view (recon_both):
# one sparse view -> present recon (anchor) + future-field recon via predictor. Coordinate encoder.
method: fae
mode: recon_both
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt_range: [64, 1024]
sensor_pattern: discrete
dt_max: 12
tag: fae_shear224
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
