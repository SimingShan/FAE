# FAE (ours) on NS-buoyancy.
# CANONICAL FAE = twoview: dual sparse views (observation-invariance) + latent temporal
# predictor + dual target (present recon + future-field recon). NOT single-frame recon
# (that would be a bare Senseiver). Coordinate encoder -> resolution-free; no patches.
method: fae
mode: twoview
num_latents: 128         # encoder bottleneck (the "tokens")
num_iter: 4              # Perceiver cross/self iterations
depth_per_iter: 5         # -> 7.49M encoder, matched to MAE/JEPA 7.54M
# sparse-view sensor counts. mcnt_range [lo,hi] = random-uniform per view (smooth coverage);
# OR mcnt: [discrete list]. Random-range exposes the encoder to ALL sparsities, not just a few.
mcnt_range: [64, 1024]
# mcnt: [64, 128, 256, 512]
sensor_pattern: discrete # 'discrete' random scatter (default) | 'continuous' contiguous block
dt_max: 1                # max temporal gap for the predictor
tag: fae_ns128
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
