# Exp-1 training-time sensor config: DISCRETE scatter, FIXED 64 sensors (hard sparsity).
# Tests whether training only on hard sparsity builds a more robust encoder.
method: fae
mode: twoview
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt: [64]
sensor_pattern: discrete
dt_max: 1
tag: fae_disc64
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
