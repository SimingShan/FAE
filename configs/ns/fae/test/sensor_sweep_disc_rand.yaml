# Exp-1 training-time sensor config: DISCRETE scatter, RANDOM count in [64,1024] (= canonical default).
# The reference arm: encoder sees all sparsities during training.
method: fae
mode: twoview
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt_range: [64, 1024]
sensor_pattern: discrete
dt_max: 1
tag: fae_discrand
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
