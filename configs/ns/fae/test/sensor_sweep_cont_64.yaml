# Exp-1 training-time sensor config: CONTINUOUS block, FIXED 64 sensors (clustered, hard sparsity).
# Realistic clustered-sensor regime — does FAE handle structured (not random) sparsity?
method: fae
mode: twoview
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt: [64]
sensor_pattern: continuous
dt_max: 1
tag: fae_cont64
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
