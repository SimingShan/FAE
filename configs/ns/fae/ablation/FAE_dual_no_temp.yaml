# ABLATION cell (+dual-view, -temporal): dual-view shared PRESENT target, no predictor.
# Two sparse views of x_t both decode to the same dense target -> observation-invariance,
# but NO dynamics. Isolates the dual-view invariance factor alone.
method: fae
mode: twoview_present
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt_range: [64, 1024]
sensor_pattern: discrete
dt_max: 1
tag: FAE_dual_no_temp
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
