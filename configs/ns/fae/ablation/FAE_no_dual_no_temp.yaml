# ABLATION cell (-dual-view, -temporal): single-view PRESENT-RECON = bare Senseiver.
# Coordinate encoder + decoder, one sparse view -> reconstruct present. No invariance, no dynamics.
# The architectural floor: isolates "is FAE's advantage just the coordinate architecture?"
method: fae
mode: recon
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt_range: [64, 1024]
sensor_pattern: discrete
dt_max: 1
tag: FAE_no_dual_no_temp
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
