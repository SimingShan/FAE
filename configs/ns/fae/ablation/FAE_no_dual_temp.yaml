# ABLATION cell (-dual-view, +temporal): single-view recon + latent predictor.
# One sparse view -> present recon (anchor) + future-field recon via predictor. Adds DYNAMICS
# but NOT observation-invariance. Isolates the temporal-prediction factor alone.
method: fae
mode: recon_both
num_latents: 128
num_iter: 4
depth_per_iter: 5
mcnt_range: [64, 1024]
sensor_pattern: discrete
dt_max: 1
tag: FAE_no_dual_temp
lr: 5.0e-4
weight_decay: 1.0e-4
betas: [0.9, 0.999]
